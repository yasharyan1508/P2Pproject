name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    # Server checks
    - name: Install server dependencies
      working-directory: ./server
      run: npm ci

    - name: Build server
      working-directory: ./server
      run: npm run build

    - name: Test server
      working-directory: ./server
      run: npm run test

    # Client checks
    - name: Install client dependencies
      working-directory: ./client
      run: npm ci

    - name: Lint client
      working-directory: ./client
      run: npm run lint

    - name: Build client
      working-directory: ./client
      run: npm run build

    - name: Test client
      working-directory: ./client
      run: npm run test
